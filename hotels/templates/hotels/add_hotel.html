{% extends 'base.html' %}

{% block title %}Add Hotel - LuxeStay{% endblock %}

{% block content %}
<section class="py-12 bg-gray-50 min-h-[calc(100vh-4rem)]">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-8" data-aos="fade-down">
            <a href="{% url 'manager_dashboard' %}" class="text-blue-600 hover:underline mb-4 inline-block"><i
                    class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            <h1 class="text-3xl font-bold text-primary font-serif mb-2">Add New Property</h1>
            <p class="text-gray-600">Enter the details of your hotel below. It will require administrator approval
                before appearing in search results.</p>
        </div>

        <div class="bg-white rounded-xl shadow border border-gray-100 p-8" data-aos="fade-up">
            <form method="POST" action="{% url 'add_hotel' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Hotel Name *</label>
                        <input type="text" name="name" required
                            class="w-full border-gray-300 rounded-md shadow-sm focus:ring-accent focus:border-accent p-2 border bg-gray-50">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Location / Address *</label>
                        <input type="text" name="location" required
                            class="w-full border-gray-300 rounded-md shadow-sm focus:ring-accent focus:border-accent p-2 border bg-gray-50">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description *</label>
                        <textarea name="description" rows="5" required
                            class="w-full border-gray-300 rounded-md shadow-sm focus:ring-accent focus:border-accent p-2 border bg-gray-50"></textarea>
                    </div>

                    <div class="pt-4 border-t border-gray-200">
                        <button type="submit"
                            class="bg-primary hover:bg-blue-900 text-white font-bold py-3 px-6 rounded-md shadow w-full transition duration-300">
                            Submit for Approval
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
