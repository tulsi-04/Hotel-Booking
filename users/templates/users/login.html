{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign in - LuxeStay{% endblock %}

{% block content %}
<section class="min-h-[calc(100vh-4rem)] flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-lg border border-gray-100" data-aos="fade-up">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-primary mb-2 font-serif">Welcome Back</h2>
            <p class="text-gray-600">Please sign in to your account</p>
        </div>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            {{ form|crispy }}

            <div class="mt-6 flex items-center justify-between">
                <div class="text-sm">
                    <a href="#" class="font-medium text-accent hover:text-yellow-600 transition">
                        Forgot your password?
                    </a>
                </div>
            </div>

            <div class="mt-8">
                <button type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold text-primary bg-accent hover:bg-yellow-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent transition duration-300 glowing-btn">
                    Sign in
                </button>
            </div>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                Don't have an account?
                <a href="{% url 'register' %}" class="font-medium text-accent hover:text-yellow-600 transition">Sign up
                    now</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
