{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- Hero Section -->
<section class="relative h-screen flex items-center justify-center overflow-hidden">
    <!-- Background Image/Video -->
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1542314831-c53cd3816002?q=80&w=2070&auto=format&fit=crop"
            alt="Luxury Hotel" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-primary opacity-60"></div>
    </div>

    <div class="relative z-10 text-center text-white px-4 max-w-5xl mx-auto" data-aos="zoom-in">
        <h1 class="text-5xl md:text-7xl font-bold mb-6 font-serif">Welcome to <span class="text-accent">LuxeStay</span>
        </h1>
        <p class="text-xl md:text-2xl mb-10 text-gray-200">Experience world-class luxury and unparalleled comfort.</p>

        <!-- Search Booking Form -->
        <div class="glassmorphism p-6 rounded-lg shadow-2xl animate-fade-in-up">
            <form action="#" method="GET" class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 text-left">
                    <label class="block text-sm font-medium mb-1 text-gray-200">Location</label>
                    <input type="text" name="location" placeholder="Where are you going?"
                        class="w-full px-4 py-3 rounded-md text-gray-800 focus:ring-2 focus:ring-accent outline-none">
                </div>
                <div class="flex-1 text-left">
                    <label class="block text-sm font-medium mb-1 text-gray-200">Check In</label>
                    <input type="date" name="check_in"
                        class="w-full px-4 py-3 rounded-md text-gray-800 focus:ring-2 focus:ring-accent outline-none">
                </div>
                <div class="flex-1 text-left">
                    <label class="block text-sm font-medium mb-1 text-gray-200">Check Out</label>
                    <input type="date" name="check_out"
                        class="w-full px-4 py-3 rounded-md text-gray-800 focus:ring-2 focus:ring-accent outline-none">
                </div>
                <div class="flex-1 text-left">
                    <label class="block text-sm font-medium mb-1 text-gray-200">Guests</label>
                    <select name="guests"
                        class="w-full px-4 py-3 rounded-md text-gray-800 focus:ring-2 focus:ring-accent outline-none">
                        <option value="1">1 Guest</option>
                        <option value="2">2 Guests</option>
                        <option value="3">3 Guests</option>
                        <option value="4">4+ Guests</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button type="submit"
                        class="w-full md:w-auto bg-accent hover:bg-yellow-600 text-primary font-bold px-8 py-3 rounded-md transition duration-300 glowing-btn">
                        Search
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

<!-- Featured Hotels Section -->
<section class="py-20 bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16" data-aos="fade-up">
            <h2 class="text-3xl md:text-4xl font-bold text-primary mb-4 font-serif">Featured <span
                    class="text-accent">Hotels</span></h2>
            <div class="h-1 w-24 bg-accent mx-auto rounded"></div>
            <p class="mt-4 text-gray-600">Discover our hand-picked selection of premium destinations.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Hotel Card 1 -->
            <div class="bg-white rounded-xl shadow-lg overflow-hidden group img-zoom-container" data-aos="fade-up"
                data-aos-delay="100">
                <div class="relative h-64">
                    <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=2070&auto=format&fit=crop"
                        alt="Hotel" class="w-full h-full object-cover img-zoom">
                    <div
                        class="absolute top-4 right-4 bg-white/90 px-3 py-1 rounded-full text-sm font-bold text-primary shadow">
                        <i class="fa-solid fa-star text-accent"></i> 4.9
                    </div>
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold text-primary mb-2">Grand Plaza Resort</h3>
                    <p class="text-gray-600 mb-4"><i class="fa-solid fa-location-dot text-accent mr-2"></i>New York, USA
                    </p>
                    <div class="flex justify-between items-center border-t pt-4">
                        <div class="text-primary font-bold">
                            <span class="text-2xl">$299</span> <span class="text-sm font-normal text-gray-500">/
                                night</span>
                        </div>
                        <a href="#"
                            class="bg-primary hover:bg-blue-900 text-white px-4 py-2 rounded transition">Details</a>
                    </div>
                </div>
            </div>

            <!-- Add more dummy cards for UI testing as needed -->
        </div>
    </div>
</section>
{% endblock %}
